# begin .github/workflows/classroom.yml
# Thin caller for ECA Director (prompt-only) assignments.
# Delegates all logic to the shared reusable workflow in workflows-central.
#
# After forking to a classroom org, update the 'uses:' line below
# to point to your org's fork of workflows-central:
#   uses: <your-org>/workflows-central/...@<version>
#
# Prerequisites (set at the classroom org level):
#   vars.PYTHON_GRADER_URL   — grader container image URL
#   secrets.CR_PAT, secrets.GOOGLE_API_KEY (or other API keys), etc.

name: Autograding Tests
on:
  - push
  - workflow_dispatch
  - repository_dispatch
  - pull_request

permissions:
  checks: read
  actions: write
  contents: read

jobs:
  grade:
    uses: eca2603mon/workflows-central/.github/workflows/classroom-prompt-reusable.yml@v2.2.2
    with:
      python_grader: ${{ vars.PYTHON_GRADER_URL }}
      explanation_language: Korean
    secrets: inherit

# end .github/workflows/classroom.yml
